services:
  coredns:
    image: coredns-tailscale:latest
    container_name: coredns
    network_mode: host
    restart: unless-stopped
    volumes:
      - /var/run/tailscale/tailscaled.sock:/var/run/tailscale/tailscaled.sock
      - /opt/coredns/Corefile:/etc/coredns/Corefile
      - /opt/coredns/hosts:/etc/coredns/hosts
